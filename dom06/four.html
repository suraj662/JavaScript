<!-- remove and edit element in DOM -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript with vscode</title>
</head>
<body style="background-color: black; color : white
">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    //way to add new element in the list of language
    //but not a good way to add new element in the list 
    //of language because it will override the existing element in the list
   function addLang(langName){
    //create a new element
    const li = document.createElement('li');
    //add text node to li
    li.innerHTML = `${langName}`;
    //add li to ul with class name language
    document.querySelector('.language')
    .appendChild(li);
   }
    
   addLang("python");
   addLang("java");

   //or - using optimized way --
   function addLangOpt(langName){
    const li = document.createElement('li');
    //const addText = document.createTextNode(langName);
    //or
    li.appendChild(document.createTextNode(langName));
    document.querySelector('.language').appendChild(li);
   }
   addLangOpt("c++");
   addLangOpt("Typescipt");

   //edit element in the list of language
   const thirdLang = document.querySelector("li:nth-child(3)");
   //thirdLang.innerHTML = "golang";
   //or 
   const newli = document.createElement('li');
   newli.textContent = "rust";
   thirdLang.replaceWith(newli);

   //replace 1st javascript with 5th typecript
   //get 1st child of ul with class name language
   const firstLang = document.querySelector('li:first-child');
   //change whole outerhtml of first child to typescript
    firstLang.outerHTML = "<li>typescript</li>";

    //remove last lang
    const lastLang = document.querySelector('li:last-child');
    lastLang.remove();
   

</script>
</html>
