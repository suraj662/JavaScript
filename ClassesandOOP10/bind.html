<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>Button Clicked</button>
</body>
<script>
    class React {
        constructor(){
            this.library = "React"
            this.server = "https://localhost:300"

            //requirement
            document
                .querySelector('button')
                //using bind keyword to bind the this keyword to the class and not to the button element
                //means when the button is clicked the this keyword will refer to the class and not to the button element
                //if we don't use bind keyword then the this keyword will refer to the button element and not to the class and 
                //we will get undefined when we try to access the server property of the class
                .addEventListener('click', this.handleClick.bind(this))

        }
        handleClick(){
            console.log("button clicked");
            console.log(this.server);
        }
    }

    const app = new React()
</script>
</html>
